# /etc/nginx/sites-available/digitaltwin
#
# VitalHealth — BioGears Digital Twin API
# Reverse proxy: public HTTPS → localhost:8000 (Uvicorn)
#
# SETUP INSTRUCTIONS:
#   sudo cp deployment/nginx.conf /etc/nginx/sites-available/digitaltwin
#   sudo ln -sf /etc/nginx/sites-available/digitaltwin /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# FOR SSL (if you have a domain):
#   sudo certbot --nginx -d yourdomain.com
#   (Certbot will update this file automatically)
#
# FOR IP-ONLY (no domain): HTTP works; the app has usesCleartextTraffic=true

server {
    listen 80;
    # Replace _ with your domain name if you have one, e.g.: server_name yourdomain.com;
    server_name _;

    # ── Timeouts — BioGears simulations run 10–25 minutes ────────────────────
    proxy_read_timeout    1800s;   # 30 min max wait for simulation result
    proxy_connect_timeout   30s;
    proxy_send_timeout     300s;

    # ── Allow large payloads (state XMLs, scenario batches) ──────────────────
    client_max_body_size 200M;

    # ── Main API proxy ────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;

        # Forward original client info to FastAPI
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Required for streaming endpoints & WebSockets
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "";

        # Disable response buffering — needed for SSE/streaming vitals
        proxy_buffering     off;
        proxy_cache         off;
    }

    # ── Simulation HTML reports — served directly as static files ────────────
    # Avoids sending large HTML through Uvicorn unnecessarily
    location /view-reports/ {
        alias   /home/ubuntu/health-digital-twin/reports/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        # Only allow .html and .png files (deny directory listing)
        location ~* \.(html|png|css|js)$ { }
        location / { return 403; }
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "no-referrer"    always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/digitaltwin_access.log;
    error_log   /var/log/nginx/digitaltwin_error.log  warn;
}
