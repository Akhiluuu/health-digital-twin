# /etc/nginx/sites-available/digitaltwin
#
# VitalHealth Digital Twin — Nginx Reverse Proxy
# Routes:
#   http://VM_IP/        → BioGears Simulation API  (localhost:8000)
#   http://VM_IP/ai/     → Health AI Dr. Aria        (localhost:8001)
#
# Setup:
#   sudo cp deployment/nginx.conf /etc/nginx/sites-available/digitaltwin
#   sudo ln -sf /etc/nginx/sites-available/digitaltwin /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ── BioGears Simulation API ───────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # BioGears simulations run 10–25 minutes — generous timeouts
    proxy_read_timeout    1800s;
    proxy_connect_timeout   30s;
    proxy_send_timeout     300s;

    client_max_body_size 200M;

    # ── BioGears API (all routes except /ai/) ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Health AI — Dr. Aria Chatbot ─────────────────────────────────────────
    # Mobile app accesses: http://VM_IP/ai/generate, /ai/health, etc.
    # Nginx strips the /ai prefix before forwarding to port 8001.
    location /ai/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "";
        # Disable buffering — LLM responses stream token by token
        proxy_buffering    off;
        proxy_cache        off;
        # LLM generation can take up to 2 minutes
        proxy_read_timeout 120s;
    }

    # ── Simulation HTML reports ───────────────────────────────────────────────
    location /view-reports/ {
        alias   /home/ubuntu/health-digital-twin/reports/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-Frame-Options        "DENY"          always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"   always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/digitaltwin_access.log;
    error_log  /var/log/nginx/digitaltwin_error.log warn;
}

# ── Direct port access (bypass Nginx — for debugging only) ───────────────────
# BioGears:  http://VM_IP:8000  (direct uvicorn)
# Health AI: http://VM_IP:8001  (direct uvicorn)
# Open both ports in E2E Cloud Security Group if the app connects directly.
